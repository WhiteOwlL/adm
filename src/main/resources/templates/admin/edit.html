<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit User</title>
</head>
<body>
<h1>Edit User</h1>

<form th:action="@{/admin/edit}" method="post">
  <input type="hidden" name="id" th:value="${user.id}" />

  <p>Username: <input type="text" name="username" th:value="${user.username}" required /></p>
  <p>Password: <input type="password" name="password" th:value="${user.password}" /></p>
  <p>First Name: <input type="text" name="firstName" th:value="${user.firstName}" /></p>
  <p>Last Name: <input type="text" name="lastName" th:value="${user.lastName}" /></p>
  <p>Age: <input type="number" name="age" th:value="${user.age}" /></p>

  <p>Roles:</p>
  <label><input type="checkbox" name="roleList" value="ROLE_ADMIN"
                th:checked="${user.roles.?[name == 'ROLE_ADMIN'].size() > 0}" /> ROLE_ADMIN</label><br>
  <label><input type="checkbox" name="roleList" value="ROLE_USER"
                th:checked="${user.roles.?[name == 'ROLE_USER'].size() > 0}" /> ROLE_USER</label><br>

  <button type="submit">Save Changes</button>
</form>

<br>
<a th:href="@{/admin}">Back to Admin Panel</a>
</body>
</html>
